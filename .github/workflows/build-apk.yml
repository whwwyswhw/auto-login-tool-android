name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install Flet and dependencies
      run: |
        pip install -r requirements.txt
        pip install flet[build]
      timeout-minutes: 10
    
    - name: Build APK (non-interactive)
      run: |
        export FLET_ACCEPT_PROMPTS=yes
        yes | flet build apk --non-interactive || true
        # If first build fails, try again without --non-interactive
        if [ ! -f "build/apk/*.apk" ]; then
          echo "First build attempt failed, retrying..."
          yes | flet build apk
        fi
      timeout-minutes: 45
    
    - name: Check APK exists
      run: |
        ls -lh build/apk/ || echo "APK directory not found"
        test -f build/apk/*.apk && echo "APK built successfully" || echo "APK not found"
    
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: pk10-android-apk
        path: build/apk/*.apk
        if-no-files-found: error
