name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install Flet and dependencies
      run: |
        pip install -r requirements.txt
        pip install flet[build]
    
    - name: Build APK
      run: yes | flet build apk
      env:
        FLET_ANDROID_SDK_AUTO_INSTALL: "1"
    
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: pk10-android-apk
        path: build/apk/*.apk
        if-no-files-found: error
